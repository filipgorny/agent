# Example agent configuration.

# First message sent to the agent (the system prompt is generated from the
# enabled plugins/skills, not set here).
initial_message: |
  Research the topic and reason about it.

# Response language (default: English).
language: English

# Allow the agent to ask the user (ask_user/ask_choice skills). For CLI/TUI use.
interactive: true

# Passed to the llm-provider package to build the LLM instance.
llm:
  llm: ollama
  ollama:
    url: http://localhost:11434
    model: qwen2.5-coder:14b
    options:                 # passed to Ollama; size context to your VRAM
      num_ctx: 8192
  claude:
    model: claude-opus-4-8   # optional

# Token economy for small-context models: results larger than this are offloaded
# to a result store and replaced with a preview + id (read more via get_result).
max_result_chars: 2000

# Plugins to enable (each groups a set of skills and the events they emit).
plugins:
  - files
  - web
  - text
  - reasoning
  - shell
  - interaction

# Skills to enable (must belong to an enabled plugin).
skills:
  - file_read
  - file_write
  - grep
  - dir_list
  - file_watch
  - web_get
  - summarize_text
  - translate
  - think
  - shell_run
  - ask_user
  - ask_choice

# Long-term memory.
memory:
  backend: sqlite          # sqlite (default) | inmemory
  path: ./agent-memory.db  # empty = in-memory SQLite (no file)
